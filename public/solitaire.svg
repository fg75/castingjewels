// --- SOTTO-COMPONENTI DI SUPPORTO ---

const SpecItem = ({ icon, label, value }: { icon: React.ReactNode, label: string, value: string }) => (
  <div className="flex items-start gap-3">
    <div className="text-[#d4af37] mt-0.5">{icon}</div>
