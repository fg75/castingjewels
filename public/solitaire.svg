      <span className="block text-xs font-medium text-gray-900">{value}</span>
    </div>
  </div>
);

const BlueprintCard = ({ title, image, dimension }: { title: string, image: string, dimension: string }) => (
  <div className="group relative bg-white border border-gray-100 p-4 transition-all hover:shadow-xl">
    <div className="aspect-[4/3] mb-6 overflow-hidden bg-gray-50 relative border border-gray-50">
      <div className="absolute inset-0 opacity-[0.03] pointer-events-none" 
           style={{ backgroundImage: 'linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px)', backgroundSize: '20px 20px' }} />
      <img src={image}